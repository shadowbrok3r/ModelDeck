name: Build images

# Builds compile on the runner with Swatinem/rust-cache (caches the cargo registry
# + target/ verbatim, so only changed crates recompile across runs — handles dx's
# dual wasm+native build cleanly). The Docker images are thin runtime-only packages
# of the artifacts. First run after a cache reset is slow (warms the cache); later
# runs are incremental.
#
# RUNNER PINNED TO ubuntu-22.04 (glibc 2.35) ON PURPOSE: the runtime base images are
# Debian bookworm (glibc 2.36). A binary linked against a newer glibc (ubuntu-24.04 =
# 2.39) fails at runtime with "GLIBC_2.38 not found". glibc is forward-compatible, so
# build on the OLDEST glibc that's <= the runtime's. Bump the runner only if the
# runtime bases also move up. The gl235 cache-key suffix isolates these artifacts.

on:
  push:
    branches: [master, main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'homeassistant/**'
      - 'deploy/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'   # incremental hurts cache reuse in CI; rely on dep cache

jobs:
  hub:
    name: hub ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          version="$(sed -nE 's/^version:[[:space:]]*"?([^"#]+)"?.*/\1/p' homeassistant/config.yaml | tr -d '[:space:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: hub-gl235-${{ matrix.arch }}
          cache-all-crates: true

      - name: Restore dx CLI
        id: dxcache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/dx
          key: dx-0.7.9-gl235-${{ matrix.arch }}

      - name: Install dx CLI
        if: steps.dxcache.outputs.cache-hit != 'true'
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash || true
          cargo binstall -y dioxus-cli@0.7.9 || cargo install dioxus-cli@0.7.9 --locked
          dx --version

      - name: Build web bundle
        working-directory: crates/hub
        run: |
          touch .env
          dx build --release --platform web --debug-symbols false

      - name: Stage runtime context
        run: |
          mkdir -p ctx
          cp target/dx/model_deck/release/web/server ctx/model_deck
          cp -r target/dx/model_deck/release/web/public ctx/public
          cp -r homeassistant/rootfs ctx/rootfs
          cp homeassistant/runtime.Dockerfile ctx/Dockerfile

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ctx
          push: true
          provenance: false
          tags: |
            ghcr.io/shadowbrok3r/modeldeck-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/shadowbrok3r/modeldeck-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=modeldeck-hub-rt-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=modeldeck-hub-rt-${{ matrix.arch }}

  agent:
    name: agent ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          version="$(sed -nE 's/^version:[[:space:]]*"?([^"#]+)"?.*/\1/p' homeassistant/config.yaml | tr -d '[:space:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: agent-gl235-${{ matrix.arch }}
          cache-all-crates: true

      - name: Build agent
        run: cargo build -p modeldeck-agent --release --locked

      - name: Stage runtime context
        run: |
          mkdir -p actx
          cp target/release/modeldeck-agent actx/modeldeck-agent
          cp deploy/agent.runtime.Dockerfile actx/Dockerfile

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: actx
          push: true
          provenance: false
          tags: |
            ghcr.io/shadowbrok3r/modeldeck-agent-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/shadowbrok3r/modeldeck-agent-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=modeldeck-agent-rt-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=modeldeck-agent-rt-${{ matrix.arch }}
