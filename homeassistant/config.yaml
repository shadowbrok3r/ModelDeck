name: "ModelDeck"
description: "Manage docker/AI stacks on the UbuntuAI VMs: swap known-good LLM service profiles, edit compose/Dockerfiles, manage + download models, watch GPU/containers"
version: "0.1.1"
image: "ghcr.io/shadowbrok3r/modeldeck-{arch}"
slug: "model_deck"
init: false
arch:
  - aarch64
  - amd64
startup: application
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:cards"
panel_title: "Models"
panel_admin: true
ports:
  8099/tcp: null
options:
  SURREAL_URL: "wss://surrealdb.shadowbroker.app"
  SURREAL_USER: "root"
  SURREAL_PASS: ""
  MODELDECK_AGENT_SECRET: ""
  HF_TOKEN: ""
schema:
  SURREAL_URL: "str?"
  SURREAL_USER: "str?"
  SURREAL_PASS: "password?"
  MODELDECK_AGENT_SECRET: "password?"
  HF_TOKEN: "password?"
map:
  - type: data
